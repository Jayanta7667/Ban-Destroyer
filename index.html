<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ban Destroyer</title><style>
body{
 margin:0;
 background:linear-gradient(#0f2027,#203a43,#2c5364);
 font-family:Arial;
 text-align:center;
 color:#fff;
}

h2{margin:10px;}

button{
 padding:12px 30px;
 background:#00ffcc;
 border:none;
 border-radius:8px;
 font-size:18px;
 cursor:pointer;
 box-shadow:0 0 10px #00ffcc;
}

canvas{
 display:block;
 margin:10px auto;
 border-radius:12px;
 background:linear-gradient(#1e1e1e,#2a2a2a);
 box-shadow:0 0 20px rgba(0,0,0,0.6);
}
</style></head><body><h2 id="levelText">Ban Destroyer</h2>
<button onclick="startGame()">START GAME</button>
<canvas id="c" width="400" height="600"></canvas><script>
let c=document.getElementById("c");
let ctx=c.getContext("2d");

let moai=new Image();
moai.src="moai1.png";

let ban=new Image();
ban.src="Ban2.jpg";

let started=false;
let level=1;

let gravity=0.6;

let player={x:100,y:450,vx:0,vy:0,drag:false,launched:false};
let blocks=[];

function startGame(){
 started=true;
 loadLevel();
}

function loadLevel(){
 document.getElementById("levelText").innerText="Level "+level;

 blocks=[];

 if(level==1){
  blocks=[{x:280,y:500,w:60,h:60,alive:true}];
 }

 if(level==2){
  blocks=[
   {x:280,y:500,w:60,h:60,alive:true},
   {x:280,y:430,w:60,h:60,alive:true}
  ];
 }

 if(level==3){
  blocks=[
   {x:280,y:500,w:60,h:60,alive:true},
   {x:280,y:430,w:60,h:60,alive:true},
   {x:220,y:500,w:60,h:60,alive:true}
  ];
 }

 if(level==4){
  blocks=[
   {x:280,y:500,w:60,h:60,alive:true},
   {x:280,y:430,w:60,h:60,alive:true},
   {x:220,y:500,w:60,h:60,alive:true},
   {x:220,y:430,w:60,h:60,alive:true}
  ];
 }

 resetPlayer();
}

function resetPlayer(){
 player.x=100;
 player.y=450;
 player.vx=0;
 player.vy=0;
 player.launched=false;
}

function draw(){

 ctx.clearRect(0,0,400,600);

 if(!started){
  ctx.fillText("Press Start",150,300);
  return;
 }

 // ground
 ctx.fillStyle="#555";
 ctx.fillRect(0,550,400,50);

 // aim dotted line
 if(player.drag){
  ctx.fillStyle="#00ffcc";

  for(let i=1;i<6;i++){
   ctx.beginPath();
   ctx.arc(
    100+(100-player.x)/3*i,
    450+(450-player.y)/3*i,
    4,0,Math.PI*2
   );
   ctx.fill();
  }
 }

 // slingshot line
 if(player.drag){
  ctx.strokeStyle="#00ffcc";
  ctx.beginPath();
  ctx.moveTo(100,450);
  ctx.lineTo(player.x,player.y);
  ctx.stroke();
 }

 // player
 ctx.drawImage(moai,player.x-40,player.y-40,80,80);

 // targets
 blocks.forEach(b=>{
  if(b.alive){
   ctx.drawImage(ban,b.x,b.y,b.w,b.h);
  }
 });
}

function update(){

 if(!started) return;

 if(player.launched){
  player.vy+=gravity;
  player.x+=player.vx;
  player.y+=player.vy;

  if(player.y>520){
   setTimeout(resetPlayer,200);
  }

  blocks.forEach(b=>{
   if(b.alive &&
     player.x>b.x && player.x<b.x+b.w &&
     player.y>b.y && player.y<b.y+b.h){
       b.alive=false;
   }
  });

  if(blocks.every(b=>!b.alive)){
   setTimeout(()=>{
    if(level<4){
     level++;
     loadLevel();
    }else{
     alert("🔥 You Win!");
     level=1;
     loadLevel();
    }
   },300);
  }
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

// controls
c.addEventListener("mousedown",()=>{
 if(!player.launched) player.drag=true;
});

c.addEventListener("mouseup",()=>{
 if(player.drag){
  player.drag=false;
  player.launched=true;

  player.vx=(100-player.x)/3;
  player.vy=(450-player.y)/3;
 }
});

c.addEventListener("mousemove",(e)=>{
 if(player.drag){
  let r=c.getBoundingClientRect();
  player.x=e.clientX-r.left;
  player.y=e.clientY-r.top;

  // drag limit
  let dx=player.x-100;
  let dy=player.y-450;
  let dist=Math.sqrt(dx*dx+dy*dy);

  if(dist>80){
   player.x=100+dx/dist*80;
   player.y=450+dy/dist*80;
  }
 }
});
</script></body>
</html>
