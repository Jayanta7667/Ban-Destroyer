<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ban Destroyer</title>
<style>
body{margin:0;background:#111;color:#fff;text-align:center;font-family:Arial;}
canvas{background:#222;display:block;margin:auto;}
button{padding:10px 20px;background:#00ff99;border:none;margin:10px;font-size:18px;}
</style>
</head><body><h2 id="levelText">Level 1</h2>
<button onclick="startGame()">START</button>
<canvas id="c" width="360" height="500"></canvas><script>
let c=document.getElementById("c");
let ctx=c.getContext("2d");

let moai=new Image();
moai.src="moai1.png";

let ban=new Image();
ban.src="Ban2.jpg";

let started=false;
let level=1;

let gravity=0.7;

let player={x:80,y:400,vx:0,vy:0,drag:false,launched:false};

let blocks=[];

function startGame(){
 started=true;
 loadLevel();
}

function loadLevel(){
 document.getElementById("levelText").innerText="Level "+level;

 blocks=[];

 if(level==1){
  blocks=[{x:260,y:420,w:60,h:60,alive:true}];
 }

 if(level==2){
  blocks=[
   {x:260,y:420,w:60,h:60,alive:true},
   {x:260,y:350,w:60,h:60,alive:true}
  ];
 }

 if(level==3){
  blocks=[
   {x:260,y:420,w:60,h:60,alive:true},
   {x:260,y:350,w:60,h:60,alive:true},
   {x:200,y:420,w:60,h:60,alive:true}
  ];
 }

 if(level==4){
  blocks=[
   {x:260,y:420,w:60,h:60,alive:true},
   {x:260,y:350,w:60,h:60,alive:true},
   {x:200,y:420,w:60,h:60,alive:true},
   {x:200,y:350,w:60,h:60,alive:true}
  ];
 }

 resetPlayer();
}

function resetPlayer(){
 player.x=80;
 player.y=400;
 player.vx=0;
 player.vy=0;
 player.launched=false;
}

function draw(){
 ctx.clearRect(0,0,360,500);

 if(!started){
  ctx.fillText("Press START",130,250);
  return;
 }

 // ground
 ctx.fillStyle="#555";
 ctx.fillRect(0,440,360,60);

 // slingshot line
 if(player.drag){
  ctx.strokeStyle="#00ff99";
  ctx.beginPath();
  ctx.moveTo(80,400);
  ctx.lineTo(player.x,player.y);
  ctx.stroke();
 }

 // player
 ctx.drawImage(moai,player.x-35,player.y-35,70,70);

 // blocks
 blocks.forEach(b=>{
  if(b.alive){
   ctx.drawImage(ban,b.x,b.y,b.w,b.h);
  }
 });
}

function update(){
 if(!started) return;

 if(player.launched){
  player.vy+=gravity;
  player.x+=player.vx;
  player.y+=player.vy;

  if(player.y>420){
   resetPlayer(); // 🔥 reset like angry birds
  }

  // hit
  blocks.forEach(b=>{
   if(b.alive &&
     player.x>b.x && player.x<b.x+b.w &&
     player.y>b.y && player.y<b.y+b.h){
       b.alive=false;
   }
  });

  // win
  if(blocks.every(b=>!b.alive)){
    setTimeout(()=>{
      if(level<4){
        level++;
        loadLevel();
      }else{
        alert("🔥 WIN!");
        level=1;
        loadLevel();
      }
    },300);
  }
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

// controls
c.addEventListener("mousedown",()=>{
 if(!player.launched) player.drag=true;
});

c.addEventListener("mouseup",()=>{
 if(player.drag){
  player.drag=false;
  player.launched=true;

  player.vx=(80-player.x)/3;
  player.vy=(400-player.y)/3;
 }
});

c.addEventListener("mousemove",(e)=>{
 if(player.drag){
  let r=c.getBoundingClientRect();
  player.x=e.clientX-r.left;
  player.y=e.clientY-r.top;
 }
});
</script></body>
</html>
